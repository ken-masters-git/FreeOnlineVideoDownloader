name: Build Windows EXE

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp into .vendor
        shell: powershell
        run: |
          python -m pip install --disable-pip-version-check --upgrade --target .\.vendor yt-dlp

      - name: Install PyInstaller into .pyinstaller_vendor
        shell: powershell
        run: |
          python -m pip install --disable-pip-version-check --upgrade --target .\.pyinstaller_vendor pyinstaller

      - name: Download and extract FFmpeg
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          New-Item -ItemType Directory -Force -Path .\tools | Out-Null
          Invoke-WebRequest -Uri 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile '.\tools\ffmpeg-release-essentials.zip'
          if (Test-Path '.\tools\ffmpeg') {
              Remove-Item -Recurse -Force '.\tools\ffmpeg'
          }
          Expand-Archive -Path '.\tools\ffmpeg-release-essentials.zip' -DestinationPath '.\tools\ffmpeg'
          Get-ChildItem -Path .\tools\ffmpeg

      - name: Build FreeOnlineVideoDownloader.exe
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\build_free_online_video_downloader_exe.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeOnlineVideoDownloader-${{ github.ref_name }}-windows
          path: .\dist\FreeOnlineVideoDownloader.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish release asset for version tags
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $exe = (Resolve-Path '.\dist\FreeOnlineVideoDownloader.exe').Path
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $exe --repo $repo --clobber
          } else {
              gh release create $tag $exe --repo $repo --title "FreeOnlineVideoDownloader $tag" --notes "Automated Windows build for $tag."
          }
